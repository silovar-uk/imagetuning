name: Build and Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Unit tests
        shell: bash
        run: set -o pipefail; npm run test 2>&1 | tee test.log
      - name: Type check and build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee build.log
      - run: npx playwright install --with-deps chromium
      - name: Generate visual baseline and run browser tests
        shell: bash
        run: set -o pipefail; npm run test:e2e -- --update-snapshots 2>&1 | tee playwright.log
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-diagnostics
          path: |
            test.log
            build.log
            playwright.log
            test-results
      - name: Upload visual baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-baseline
          if-no-files-found: ignore
          path: e2e/**/*-snapshots/*.png
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
